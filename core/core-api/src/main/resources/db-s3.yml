spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

---
spring.config.activate.on-profile: local, dev

storage:
  s3:
    endpoint: ${S3_ENDPOINT}
    bucket: moodit
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${s3_SECRET_KEY}

---
spring.config.activate.on-profile: test

storage:
  s3:
    endpoint: http://dummy
    bucket: moodit
    access-key: dummy
    secret-key: dummy
