name: Spring Boot Advanced CI

# 1. 언제 CI를 실행할지 상세하게 제어합니다.
on:
  push:
    branches: [ "main" ]
    # 문서(.md)만 수정했을 때는 굳이 서버 자원을 낭비하며 CI를 돌리지 않도록 설정합니다.
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]

# 2. 깃허브 토큰의 권한을 최소화하여 보안을 강화합니다.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Repository 코드 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: 2. Java 21 환경 세팅
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 3. (중요) 의존성 캐싱을 통해 다음 빌드 속도를 획기적으로 줄입니다.
    - name: 3. Gradle 캐싱 및 환경 세팅
      uses: gradle/actions/setup-gradle@v3

    - name: 4. gradlew 실행 권한 부여
      run: chmod +x gradlew

    - name: 5. 프로젝트 빌드 및 테스트 실행
      run: ./gradlew build

    # 6. (중요) 테스트가 실패하더라도 리포트를 남겨서 원인을 분석할 수 있게 합니다.
    - name: 6. 테스트 결과 리포트 저장 (Artifacts)
      if: always() # 빌드 성공/실패 여부와 상관없이 항상 실행
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/reports/tests/test/
        retention-days: 7 # 깃허브 용량 관리를 위해 7일 후 리포트 자동 삭제
